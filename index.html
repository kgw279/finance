<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <p class="eyebrow">Budget</p>
        <h1>Dashboard</h1>
        <p class="muted">
          Clean view for your Google Sheet data from <strong>main_dash</strong>.
        </p>
      </div>

      <section class="panel config-panel">
        <h2>Data Source</h2>
        <label>
          Google API Key
          <input id="apiKey" type="password" placeholder="Paste your Google API key" />
        </label>

        <label>
          Spreadsheet ID
          <input id="spreadsheetId" type="text" placeholder="Paste your Google Sheet ID" />
        </label>

        <label>
          Range on main_dash
          <input id="sheetRange" type="text" value="A1:H50" placeholder="A1:H50" />
        </label>

        <div class="button-row">
          <button id="loadBtn">Load Dashboard</button>
          <button id="demoBtn" class="secondary">Load Demo</button>
        </div>

        <p class="help-text">
          The app always reads from <code>main_dash</code>. The range above is appended automatically.
        </p>
      </section>
    </aside>

    <main class="main-content">
      <section class="topbar">
        <div>
          <p class="eyebrow">Overview</p>
          <h2 id="dashboardTitle">Budget Summary</h2>
        </div>
        <div id="status" class="status-pill">Waiting for data</div>
      </section>

      <section id="summaryCards" class="summary-grid"></section>

      <section class="content-grid">
        <div class="panel">
          <div class="panel-header">
            <h3>Category Breakdown</h3>
            <span id="categoryCount" class="subtle"></span>
          </div>
          <div id="categoryBreakdown" class="breakdown-list empty-state">
            Load data to see categories.
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h3>Raw Data</h3>
            <span id="rowCount" class="subtle"></span>
          </div>
          <div id="tableWrap" class="table-wrap empty-state">
            No rows loaded yet.
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
